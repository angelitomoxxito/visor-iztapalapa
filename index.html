<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>SIGPE-CDMX | Sistema de Información Geográfica de Proyecciones Educativas</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<link rel="stylesheet" href="styles.css">

</head>

<body>

<header class="topbar">

<div class="logo">

<h1>SIGPE-CDMX</h1>

<span>Sistema de Información Geográfica de Proyecciones Educativas</span>

</div>

<div class="top-actions">

<input
type="text"
id="searchInput"
placeholder="Buscar escuela o CCT...">

<button id="fullscreenBtn">

<i class="fa-solid fa-expand"></i>

</button>

</div>

</header>



<div class="container">

<!-- PANEL IZQUIERDO -->

<aside class="sidebar">

<section class="card">

<h3>

<i class="fa-solid fa-layer-group"></i>

Capas

</h3>

<label>

<input type="checkbox" checked id="chkAGEB">

AGEB

</label>

<label>

<input type="checkbox" checked id="chkAlcaldias">

Alcaldías

</label>

<label>

<input type="checkbox" checked id="chkEscuelas">

Escuelas

</label>

</section>



<section class="card">

<h3>

<i class="fa-solid fa-filter"></i>

Filtros

</h3>



<label>

Alcaldía

</label>

<select id="filterAlcaldia">

<option value="Todos">

Todas

</option>

</select>



<label>

Nivel educativo

</label>

<select id="filterNivel">

<option value="Todos">

Todos

</option>

<option>

Inicial

</option>

<option>

Especial

</option>

<option>

Preescolar

</option>

<option>

Primaria

</option>

<option>

Secundaria

</option>

<option>

Adultos

</option>

</select>



<label>

Año

</label>

<select id="yearSelect">

</select>

</section>



<section class="card">

<h3>

<i class="fa-solid fa-chart-column"></i>

Resumen

</h3>

<div class="stat">

<span>Matrícula</span>

<strong id="totalMatricula">

—

</strong>

</div>

<div class="stat">

<span>Escuelas</span>

<strong id="totalEscuelas">

—

</strong>

</div>

<div class="stat">

<span>AGEB</span>

<strong id="totalAGEB">

—

</strong>

</div>

<div class="stat">

<span>Variación</span>

<strong id="variacionTotal">

—

</strong>

</div>

</section>



<section class="card">

<h3>

<i class="fa-solid fa-download"></i>

Descargas

</h3>

<button id="btnCSV">

CSV

</button>

<button id="btnPDF">

PDF

</button>

</section>

</aside>



<!-- MAPA -->

<main>

<div id="map"></div>

</main>



<!-- PANEL DERECHO -->

<aside class="detailsPanel" id="detailsPanel">

<div class="panelHeader">

<h2>

Escuela

</h2>

<button id="closePanel">

×

</button>

</div>



<div id="schoolInfo">

Selecciona una escuela.

</div>



<div class="chartContainer">

<canvas id="chartMatricula">

</canvas>

</div>



<div id="projectionTable">

</div>



<div class="comparisonBox">

<h3>

Escuelas similares

</h3>

<div id="similarSchools">

</div>

</div>



<button id="compareBtn">

Agregar al modo comparación

</button>

</aside>

</div>



<footer>

SIGPE-CDMX · AEFCM · Estadística 911

</footer>



<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="js/utils.js"></script>

<script src="js/charts.js"></script>

<script src="js/sidebar.js"></script>

<script src="js/search.js"></script>

<script src="js/filters.js"></script>

<script src="js/comparison.js"></script>

<script src="js/map.js"></script>

<script src="js/app.js"></script>

</body>

</html>
